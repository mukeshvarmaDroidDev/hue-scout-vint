version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: huescout-db
    restart: always
    environment:
      POSTGRES_USER: huescout_user
      POSTGRES_PASSWORD: huescout_password
      POSTGRES_DB: huescout
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: huescout-backend
    restart: always
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://huescout_user:huescout_password@db:5432/huescout
      - JWT_SECRET=b7d341052601cf90e4fbc875b47a3de7b489d8cf2252c842fb187a5522776c5b
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: huescout-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
